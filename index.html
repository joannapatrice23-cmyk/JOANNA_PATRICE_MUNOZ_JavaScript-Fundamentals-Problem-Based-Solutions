<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💧 Silent Thirst Tracker</title>

 <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

</head>
<body>
  <div class="app">
    <h1>💧 Silent Thirst</h1>
    <p class="subtitle">Stay focused. Stay hydrated.</p>

    <div class="card">
      <input type="number" id="goalInput" placeholder="Set daily goal (L)">
      <button class="primary" onclick="setGoal()">Set Goal</button>

      <div class="card quick-buttons">
      <button onclick="addWater(250)">250 ml</button>
      <button onclick="addWater(500)">500 ml</button>
      <button class="reset" onclick="resetTracker()">Reset</button>
    </div>

     <div class="card">
      <div class="progress-container">
        <div id="progressBar"></div>
      </div>
      <p id="status"></p>
    </div>

      
    </div>
     <script src="script.js"></script>
</body>
</html
