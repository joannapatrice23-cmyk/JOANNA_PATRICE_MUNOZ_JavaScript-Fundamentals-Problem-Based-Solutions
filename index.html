<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💧 Silent Thirst Tracker</title>

 <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

</head>
<body>

  
<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top shadow">
  <div class="container-fluid">

    <!-- Brand stays left -->
    <span class="navbar-brand">💧 Silent Thirst</span>

    <!-- Center buttons -->
    <div class="position-absolute start-50 translate-middle-x d-flex gap-5">
      <button class="btn btn-light btn-sm btn-outline-dark" onclick="showView('mainView')">Home</button>
      <button class="btn btn-light btn-sm btn-outline-dark" onclick="showView('settingsView')">Settings</button>
      <button class="btn btn-light btn- sm btn-outline-dark" onclick="showView('historyView')">History</button>
      <button class="btn btn-warning btn-sm btn-outline-dark" onclick="showView('authView')">Sign In</button>
    </div>

  </div>
</nav>

<div class="container mt-4">

  <!-- 🔹 MAIN VIEW -->
  <div id="mainView" class="view">

    <div class="app text-center">
    <h1>💧 Silent Thirst Tracker</h1>
    <p class="subtitle">Stay focused. Stay hydrated.</p>

    <div class="card">
      <input type="number" id="goalInput" placeholder="Set daily goal (L)">
      <button class="primary" onclick="setGoal()">Set Goal</button>

      <div class="card quick-buttons">
      <button onclick="addWater(250)">250 ml</button>
      <button onclick="addWater(500)">500 ml</button>
      <button onclick="addWater(750)">750 ml</button>
      <button class="reset" onclick="resetTracker()">Reset</button>
    </div>

     <div class="card progress-card">
      <div class="progress-container">
        <div id="progressBar"></div>
      </div>
      <p id="status"></p>
    </div>

      
    </div>
     <script src="script.js"></script>
</body>
</html
